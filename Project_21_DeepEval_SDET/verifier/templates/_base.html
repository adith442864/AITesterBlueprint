<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DeepEval Verifier{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            /* Claude theme — cream paper, coral accent, dark ink */
            --bg-dark: #faf9f5; --bg-card: #ffffff; --bg-input: #ffffff; --bg-hover: #f4f1ea;
            --border: #e8e3d6; --accent: #c96442; --accent-dim: #b9573a; --accent-glow: rgba(201,100,66,0.10);
            --text: #1f1e1d; --text-dim: #6b6759; --text-muted: #9a948a;
            --red: #b91c1c; --red-dim: rgba(185,28,28,0.10);
            --green: #15803d; --green-dim: rgba(21,128,61,0.10);
            --yellow: #a16207; --yellow-dim: rgba(161,98,7,0.10);
            --blue: #1d4ed8; --blue-dim: rgba(29,78,216,0.10);
            --purple: #7e22ce; --purple-dim: rgba(126,34,206,0.10);
        }
        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-dark); color: var(--text); min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3, h4 { font-family: "Source Serif 4", Georgia, serif; }
        .header { background: var(--bg-dark); border-bottom: 1px solid var(--border); padding: 20px 32px; }
        .header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
        .header h1 { font-size: 22px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 10px; }
        .header h1::before {
            content: "D"; width: 30px; height: 30px; border-radius: 7px; background: var(--accent);
            color: white; display: grid; place-items: center; font-weight: 700; font-size: 14px;
            font-family: "Inter", sans-serif;
        }
        .header h1 span { color: var(--accent); }
        .nav-links { display: flex; gap: 4px; flex-wrap: wrap; }
        .nav-links a {
            color: var(--text-dim); text-decoration: none; font-size: 13px; font-weight: 500;
            padding: 7px 14px; border-radius: 8px; transition: all 0.15s; border: 1px solid transparent;
        }
        .nav-links a:hover { color: var(--accent); background: var(--accent-glow); }
        .nav-links a.active { color: var(--accent); background: var(--accent-glow); border-color: var(--border); font-weight: 600; }
        .container { max-width: 1400px; margin: 0 auto; padding: 32px; }
        .footer { text-align: center; padding: 40px 32px; font-size: 13px; color: var(--text-muted); }
        ::selection { background: var(--accent-glow); color: var(--accent-dim); }
        {% block styles %}{% endblock %}
    </style>
</head>
<body>
<div class="header">
    <div class="header-inner">
        <h1><span>DeepEval</span> Metric Verifier</h1>
        <div class="nav-links">
            <a href="/" class="{{ 'active' if nav_active == 'evaluator' else '' }}">Evaluator</a>
            <a href="/samples" class="{{ 'active' if nav_active == 'samples' else '' }}">Sample Cases</a>
            <a href="/metrics" class="{{ 'active' if nav_active == 'metrics' else '' }}">Metrics &amp; Diagrams</a>
            <a href="/integrations" class="{{ 'active' if nav_active == 'integrations' else '' }}">Integrations</a>
        </div>
    </div>
</div>
{% block content %}{% endblock %}
<div class="footer">DeepEval Metric Verifier &mdash; Project 21: DeepEval for SDET</div>
</body>
</html>
