<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}DeepEval Verifier V2{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --paper: #faf9f5; --paper-2: #f4f1ea; --card: #ffffff;
  --ink: #1f1e1d; --ink-2: #3d3929; --muted: #6b6759; --muted-2: #9a948a;
  --line: #e8e3d6; --line-soft: #f0ebde;
  --coral: #c96442; --coral-hover: #b9573a; --coral-glow: rgba(201,100,66,0.10);
  --green: #15803d; --green-bg: #ecfdf5;
  --red: #b91c1c; --red-bg: #fef2f2;
  --blue: #1d4ed8; --blue-bg: #eff6ff;
  --amber: #a16207; --amber-bg: #fffbeb;
}
body {
  font: 15px/1.6 "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  background: var(--paper); color: var(--ink); min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3, h4 { font-family: "Source Serif 4", Georgia, serif; }
code, pre, .mono { font-family: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace; }
a { color: var(--coral); text-decoration: none; }
a:hover { text-decoration: underline; }
::selection { background: var(--coral-glow); color: var(--coral-hover); }

.header {
  background: var(--paper); border-bottom: 1px solid var(--line);
  padding: 18px 32px; position: sticky; top: 0; z-index: 10;
  backdrop-filter: blur(8px);
}
.header-inner {
  max-width: 1400px; margin: 0 auto; display: flex; align-items: center; gap: 18px;
}
.brand { display: flex; align-items: center; gap: 12px; }
.logo {
  width: 32px; height: 32px; border-radius: 8px; background: var(--coral);
  display: grid; place-items: center; color: white; font-weight: 700; font-size: 15px;
  font-family: "Inter", sans-serif;
}
.brand h1 { font-size: 18px; font-weight: 600; color: var(--ink); }
.brand .v2 {
  background: var(--coral-glow); color: var(--coral); padding: 2px 8px;
  border-radius: 999px; font-size: 11px; font-weight: 700; font-family: "Inter", sans-serif;
  margin-left: 4px;
}
.nav { display: flex; gap: 4px; margin-left: auto; align-items: center; }
.nav a {
  color: var(--muted); font-size: 13px; font-weight: 500; padding: 7px 14px;
  border-radius: 8px; transition: all .15s; border: 1px solid transparent;
}
.nav a:hover { color: var(--coral); background: var(--coral-glow); text-decoration: none; }
.progress-pill {
  font-size: 12px; color: var(--muted); padding: 6px 12px;
  background: var(--paper-2); border: 1px solid var(--line); border-radius: 999px;
  font-weight: 500;
}
.progress-pill .done { color: var(--green); font-weight: 700; }

.container { max-width: 1400px; margin: 0 auto; padding: 32px; }
.footer { text-align: center; padding: 50px 32px; font-size: 13px; color: var(--muted-2); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px;
  border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
  border: 1px solid transparent; font-family: inherit; transition: all .15s;
}
.btn-primary { background: var(--coral); color: white; }
.btn-primary:hover { background: var(--coral-hover); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.btn-secondary { background: var(--card); color: var(--ink); border-color: var(--line); }
.btn-secondary:hover { border-color: var(--coral); color: var(--coral); }
.btn-ghost { background: transparent; color: var(--muted); }
.btn-ghost:hover { color: var(--coral); }

{% block styles %}{% endblock %}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <a href="/" class="brand" style="color: inherit;">
      <div class="logo">D</div>
      <h1>DeepEval Verifier <span class="v2">V2</span></h1>
    </a>
    <nav class="nav">
      <a href="/">All Metrics</a>
      <a href="http://localhost:5180/" target="_blank">Classic Verifier ↗</a>
      <a href="http://localhost:8100/ui" target="_blank">Chatbot ↗</a>
      <span class="progress-pill"><span class="done" id="progress-done">0</span> / <span id="progress-total">{{ total or 9 }}</span> explored</span>
    </nav>
  </div>
</header>
{% block content %}{% endblock %}
<div class="footer">DeepEval Verifier V2 — Educational Mode · Project 21</div>
<script>
// Track progress in localStorage
(function() {
  const KEY = 'deepeval_v2_progress';
  window.getProgress = function() {
    try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch(e) { return []; }
  };
  window.markComplete = function(lessonId) {
    const p = new Set(getProgress()); p.add(lessonId);
    localStorage.setItem(KEY, JSON.stringify([...p]));
    updateProgressUI();
  };
  window.updateProgressUI = function() {
    const done = getProgress().length;
    const el = document.getElementById('progress-done');
    if (el) el.textContent = done;
    document.querySelectorAll('[data-lesson-id]').forEach(card => {
      if (getProgress().includes(card.dataset.lessonId)) {
        card.classList.add('completed');
      }
    });
  };
  document.addEventListener('DOMContentLoaded', updateProgressUI);
})();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
